# ========================
# Shiksha API Configuration
# ========================

server.port=3001
server.servlet.context-path=/api/v1
spring.application.name=shiksha-api

# ========================
# Database (PostgreSQL)
# ========================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/shiksha}
spring.datasource.username=${DB_USERNAME:shiksha}
spring.datasource.password=${DB_PASSWORD:shiksha_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=school
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway Migrations (disabled - using Hibernate auto DDL for development)
spring.flyway.enabled=false
spring.flyway.schemas=school
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ========================
# JWT Configuration
# ========================
app.jwt.secret=${JWT_SECRET:shikshaSecretKeyForJwtTokenGeneration2024MustBeAtLeast256BitsLong!}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=2592000000

# ========================
# MinIO (S3-compatible storage)
# ========================
app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
app.minio.bucket-name=${MINIO_BUCKET:shiksha-files}

# ========================
# Redis
# ========================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.password=${REDIS_PASSWORD:}

# ========================
# File Upload
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# CORS
# ========================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ========================
# Actuator
# ========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ========================
# OpenAPI / Swagger
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ========================
# Logging
# ========================
logging.level.com.shiksha=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
