version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: shiksha-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shiksha}
      POSTGRES_USER: ${POSTGRES_USER:-shiksha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shiksha_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shiksha}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shiksha-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: shiksha-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shiksha-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: shiksha-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shiksha-network

  # Shiksha API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shiksha-api
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-shiksha}
      DB_USERNAME: ${POSTGRES_USER:-shiksha}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-shiksha_secret}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-shiksha-files}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - shiksha-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  shiksha-network:
    driver: bridge
